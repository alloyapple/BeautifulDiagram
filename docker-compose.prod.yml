version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: beautifuldiagram-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: beautifuldiagram
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    image: beautifuldiagram-backend:latest
    container_name: beautifuldiagram-backend
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres_password@db:5432/beautifuldiagram
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - MODEL_ID=${MODEL_ID}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL}
      - LANGCHAIN_TRACING_V2=false
    ports:
      - "8000:8000"

  frontend:
    image: beautifuldiagram-frontend:latest
    container_name: beautifuldiagram-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8888:80"

  website:
    image: beautifuldiagram-website:latest
    container_name: beautifuldiagram-website
    restart: always
    ports:
      - "3000:3000"

volumes:
  pgdata:
